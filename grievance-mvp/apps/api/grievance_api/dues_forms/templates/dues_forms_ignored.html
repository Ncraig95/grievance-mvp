<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ignored Dues Intake Files</title>
  <style>
    :root {
      --bg: #f5f7f8;
      --panel: #ffffff;
      --border: #d7e0e7;
      --text: #1f2933;
      --muted: #5b6b78;
      --accent: #0f766e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px;
      color: var(--text);
      background: var(--bg);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }
    .shell { max-width: 1500px; margin: 0 auto; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 14px;
    }
    .header, .actions {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }
    h1 { margin: 0; font-size: 28px; }
    .summary { color: var(--muted); }
    a.button {
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 8px 10px;
      text-decoration: none;
      font: inherit;
    }
    a.button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; background: #fff; }
    th, td { padding: 10px; border-bottom: 1px solid var(--border); text-align: left; vertical-align: top; }
    th { background: #eef4f6; font-size: 12px; text-transform: uppercase; color: var(--muted); }
    .hash { font-family: Consolas, "Liberation Mono", monospace; overflow-wrap: anywhere; }
    .empty { color: var(--muted); text-align: center; }
  </style>
</head>
<body>
  <main class="shell">
    <section class="panel header">
      <div>
        <h1>Ignored Dues Intake Files</h1>
        <div class="summary">{{total_count}} ignored files shown</div>
      </div>
      <div class="actions">
        <a class="button primary" href="/dues-forms">Dues Forms</a>
      </div>
    </section>
    <section class="panel">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Ignored</th>
              <th>Filename</th>
              <th>Reason</th>
              <th>Source Path</th>
              <th>SHA256</th>
            </tr>
          </thead>
          <tbody>
            {{rows}}
          </tbody>
        </table>
      </div>
    </section>
  </main>
</body>
</html>
