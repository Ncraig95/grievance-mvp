hmac_shared_secret: REPLACE_WITH_LONG_RANDOM_SECRET
log_level: INFO
wait_for_grievance_number_before_signature: true
require_approver_decision: true
intake_auth:
  # Optional additional gate for /intake when HMAC is disabled.
  # Keep blank to disable this check.
  shared_header_name: X-Intake-Key
  shared_header_value: ""
  # Optional Cloudflare Access service-token verification.
  # If one value is set, both must be set.
  cloudflare_access_client_id: ""
  cloudflare_access_client_secret: ""
db_path: /data/grievances.sqlite3
data_root: /data/grievances
docx_template_path: /app/templates/docx/statement_of_occurrence fixed.docx
doc_templates:
  grievance_form: /app/templates/docx/statement_of_occurrence fixed.docx
  mobility_formal_grievance_meeting_request: /app/templates/docx/mobility-formal-grievance-meeting-request.docx
  bellsouth_meeting_request: /app/templates/docx/Bellsouth-Telecommunications-formal-grievance-meeting-request.docx
  bellsouth_formal_grievance_meeting_request: /app/templates/docx/Bellsouth-Telecommunications-formal-grievance-meeting-request.docx
  grievance_data_request_form: /app/templates/docx/grievance_data_request_form.docx
  statement_of_occurrence: /app/templates/docx/statement_of_occurrence fixed.docx
  settlement_form_3106: /app/templates/docx/Settlement Form 3106.docx
  settlement_form: /app/templates/docx/Settlement Form 3106.docx
  true_intent_grievance_brief: /app/templates/docx/form_true_intent_grievance_brief_revised_05.20.21.docx
  disciplinary_grievance_brief: /app/templates/docx/form_disciplinary_grievance_brief_revised_05.19.21.docx
  bst_grievance_form_3g3a: /app/templates/docx/bst_grievance_form_3g3a.docx
document_policies:
  bellsouth_meeting_request:
    folder_resolution: existing_exact_grievance_id
    default_signer_field: union_rep_email
    default_requires_signature: true
  bellsouth_formal_grievance_meeting_request:
    folder_resolution: existing_exact_grievance_id
    default_signer_field: union_rep_email
    default_requires_signature: true
  mobility_formal_grievance_meeting_request:
    folder_resolution: existing_exact_grievance_id
    default_signer_field: union_rep_email
    default_requires_signature: true
  bst_grievance_form_3g3a:
    staged_flow_enabled: true
    auto_advance: true
    store_all_stage_artifacts: true
    input_source: docuseal_fill_fields
    default_requires_signature: true
rendering:
  normalize_split_placeholders: true
  layout_policies:
    statement_of_occurrence:
      enabled: true
      grievance_number_fallback: grievance_id
      single_line_ellipsis: true
      max_chars:
        grievant_name: 32
        work_address: 44
        home_address: 44
        personal_cell: 16
        personal_email: 36
        department: 20
        title: 24
        supervisor_name: 28
        supervisor_phone: 18
        supervisor_email: 36
        grievants_uid: 18
        article: 22
        witness_1_name: 24
        witness_1_title: 20
        witness_1_phone: 18
        witness_2_name: 24
        witness_2_title: 20
        witness_2_phone: 18
        witness_3_name: 24
        witness_3_title: 20
        witness_3_phone: 18
libreoffice_timeout_seconds: 45
# DOCX -> PDF backend:
# - libreoffice: local soffice conversion (default)
# - graph_word_online: Microsoft Graph / Word Online conversion
docx_pdf_engine: libreoffice
# SharePoint folder path (under library root) used only for temporary Graph conversion uploads.
docx_pdf_graph_temp_folder: Grievances/_docx_pdf_convert
grievance_id:
  mode: auto
  timezone: America/New_York
  min_width: 3
  separator: ""
officer_tracking:
  roster: []
docuseal:
  base_url: http://docuseal:3000
  api_token: REPLACE
  webhook_secret: REPLACE
  public_base_url: https://docuseal.REPLACE.org
  web_base_url: https://docuseal.REPLACE.org
  web_email: ""     # optional; fallback uses DOCUSEAL_WEB_EMAIL or DOCUSEAL_ADMIN_EMAIL
  web_password: ""  # optional; fallback uses DOCUSEAL_WEB_PASSWORD or DOCUSEAL_ADMIN_PASSWORD
  default_template_id: 1  # base template id with signature fields; app clones+replaces with generated PDF
  # Optional strict mode to force per-form template mapping.
  strict_template_ids: false
  # Signing order for submitters:
  # - preserved: sequential order (signer 2 waits for signer 1, etc.)
  # - random: any signer can sign at any time
  submitters_order: preserved
  # Optional per-form signing-order overrides (keys are template_key or doc_type).
  submitters_order_by_form:
    settlement_form_3106: random
    settlement_form: random
  # Global signature placement mode:
  # - table_preferred: trace table cell geometry first, then per-form map fallback, then generic placeholder geometry
  # - generic: always use placeholder-box geometry
  signature_layout_mode: table_preferred
  # Optional per-form override (keys are template_key or doc_type).
  # Keep statement/grievance forms pinned to generic placement until a new traced layout
  # is explicitly revalidated against the live packet.
  signature_layout_mode_by_form:
    statement_of_occurrence: generic
    grievance_form: generic
  # Global toggle for table tracing in table_preferred mode.
  signature_table_trace_enabled: true
  # Optional per-form override for tracing behavior.
  # Statement/grievance forms are intentionally trace-disabled to preserve the last
  # known-good three-line signature placement.
  signature_table_trace_by_form:
    statement_of_occurrence: false
    grievance_form: false
  # Guard stage for traced cells before accepting trace output.
  signature_table_guard_enabled: true
  # Max allowed absolute delta (normalized x/y/w/h) between trace and map cells when map exists.
  signature_table_guard_tolerance: 0.015
  # Minimum required normalized gap between signature cell right edge and date cell left edge.
  signature_table_guard_min_gap: 0.005
  # Optional deterministic per-form fallback map (normalized coordinates).
  # Used when table tracing does not confidently map all required signer cells.
  signature_table_maps:
    settlement_form_3106:
      cells:
        signer1_signature: { page: 0, x: 0.333, y: 0.689, w: 0.355, h: 0.024 }
        signer1_date: { page: 0, x: 0.705, y: 0.689, w: 0.168, h: 0.024 }
        signer2_signature: { page: 0, x: 0.333, y: 0.719, w: 0.355, h: 0.024 }
        signer2_date: { page: 0, x: 0.705, y: 0.719, w: 0.168, h: 0.024 }
  # Optional per-form template ids (keys are template_key or doc_type).
  # In strict mode this must include every form that requires signature dispatch.
  template_ids: {}
graph:
  tenant_id: REPLACE
  client_id: REPLACE
  cert_pem_path: /app/config/graph_cert.pem
  cert_thumbprint: REPLACE
  site_hostname: REPLACE.sharepoint.com
  site_path: /sites/REPLACE
  document_library: Documents
  case_parent_folder: Grievances
  generated_subfolder: Generated
  signed_subfolder: Signed
  audit_subfolder: Audit
  # Optional extra SharePoint subfolders for additional audit copies.
  # The app writes the same <doc_type>_audit.zip into each listed folder.
  audit_backup_subfolders: []
  # Optional local/NAS mirror roots. Example:
  # - /mnt/triad-nas/grievance-backups
  audit_local_backup_roots: []
  client_supplied_subfolder: Client supplied data
  # Global SharePoint folder path (under library root) for failed-process review copies.
  failed_processes_folder: config files/failed
  # Parent folder for standalone non-grievance form artifacts.
  standalone_parent_folder: Standalone Forms
email:
  enabled: true
  test_mode: false
  # Optional per-form test mode overrides (keys are template_key or doc_type).
  test_mode_by_form: {}
  sender_user_id: grievance-mailbox@REPLACE.onmicrosoft.com
  templates_dir: /app/templates/email
  internal_recipients:
  - grievance-team@REPLACE.org
  derek_email: derek@REPLACE.org
  approval_request_url_base: https://grievance-app.REPLACE.org/cases
  allow_signer_copy_link: false
  artifact_delivery_mode: sharepoint_link
  max_attachment_bytes: 2000000
  resend_cooldown_seconds: 300
  dry_run: false
standalone_forms:
  att_mobility_bargaining_suggestion:
    template_path: /app/templates/docx/AT&TMobility2023BargainingSuggestion_Form.docx
    form_label: AT&T Mobility Bargaining Suggestion
    sharepoint_folder_label: AT&T Mobility Bargaining Suggestion
    signer_count: 1
    # Set this in the live config to the Local President signer email.
    default_signer_email: ""
    sharepoint_storage:
      root_folder: Mobility Demand Forms
      label_prefix: Mobility Demand
      sequence_scope: yearly
      year_subfolders: true
      upload_generated: false
      upload_signed: true
      upload_audit: true
