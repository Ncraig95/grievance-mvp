hmac_shared_secret: "REPLACE_WITH_LONG_RANDOM_SECRET"

db_path: "/data/grievances.sqlite3"
data_root: "/data/grievances"
docx_template_path: "/app/templates/grievance_template.docx"
libreoffice_timeout_seconds: 45

docuseal:
  # In compose, docuseal container name is "docuseal", so http://docuseal works from the api container.
  base_url: "http://docuseal"
  api_token: "REPLACE"
  webhook_secret: "REPLACE"

graph:
  tenant_id: "REPLACE"
  client_id: "REPLACE"
  cert_pem_path: "/app/config/graph_cert.pem"
  cert_thumbprint: "REPLACE"
  site_hostname: "REPLACE.sharepoint.com"
  site_path: "/sites/REPLACE"
  document_library: "Documents"

email:
  enabled: true
  # Authorized mailbox identity (user principal name or mailbox GUID) used with Graph /users/{id}/...
  sender_user_id: "grievance-mailbox@REPLACE.onmicrosoft.com"
  templates_dir: "/app/templates/email"
  internal_recipients:
    - "grievance-team@REPLACE.org"
  derek_email: "derek@REPLACE.org"
  approval_request_url_base: "https://grievance-app.REPLACE.org/approval"
  allow_signer_copy_link: false
  # Recommended safe default: SharePoint link (no PDF attachment by default).
  artifact_delivery_mode: "sharepoint_link"   # sharepoint_link | attach_pdf
  max_attachment_bytes: 2000000
  resend_cooldown_seconds: 300
