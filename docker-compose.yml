name: grievance_mvp

networks:
  grievance-net:
    driver: bridge
  smtp-relay-net:
    driver: bridge

services:
  api:
    build:
      context: ./grievance-mvp/apps/api
    restart: unless-stopped
    env_file:
      - ./grievance-mvp/.env
    environment:
      - TZ=UTC
    volumes:
      - ./grievance-mvp/config:/app/config:ro
      - ./grievance-mvp/data:/data
      - "./Docx Files Template:/app/templates/docx:ro"
    networks:
      - grievance-net
    ports:
      - "127.0.0.1:${API_PORT:-8080}:8080"

  smtp_graph_bridge:
    build:
      context: ./grievance-mvp/apps/smtp_graph_bridge
    restart: unless-stopped
    env_file:
      - ./grievance-mvp/.env
    environment:
      - TZ=UTC
      - GRAPH_CONFIG_PATH=/app/config/config.yaml
      - SMTP_BIND_HOST=0.0.0.0
      - SMTP_BIND_PORT=${DOCUSEAL_SMTP_PORT:-1025}
    volumes:
      - ./grievance-mvp/config:/app/config:ro
    networks:
      - smtp-relay-net

  docuseal_db:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - ./grievance-mvp/.env
    environment:
      POSTGRES_USER: ${DOCUSEAL_DB_USER:-docuseal}
      POSTGRES_PASSWORD: ${DOCUSEAL_DB_PASSWORD:-docuseal}
      POSTGRES_DB: ${DOCUSEAL_DB_NAME:-docuseal}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    volumes:
      - docuseal_db_data:/var/lib/postgresql/data
    networks:
      - grievance-net

  docuseal:
    image: "${DOCUSEAL_IMAGE:-docuseal/docuseal:2.3.0}"
    restart: unless-stopped
    depends_on:
      docuseal_db:
        condition: service_healthy
      smtp_graph_bridge:
        condition: service_started
    env_file:
      - ./grievance-mvp/.env
    environment:
      - TZ=UTC
      - DATABASE_URL=postgresql://${DOCUSEAL_DB_USER:-docuseal}:${DOCUSEAL_DB_PASSWORD:-docuseal}@docuseal_db:5432/${DOCUSEAL_DB_NAME:-docuseal}
      - APP_URL=${DOCUSEAL_PROTOCOL:-https}://${DOCUSEAL_HOST:-docuseal.local}
      - HOST=${DOCUSEAL_HOST:-docuseal.local}
      - FORCE_SSL=true
      - RAILS_LOG_TO_STDOUT=true
      - ADMIN_USERNAME=${DOCUSEAL_ADMIN_EMAIL:-admin@example.org}
      - ADMIN_PASSWORD=${DOCUSEAL_ADMIN_PASSWORD:-CHANGE_ME_please}
      - SMTP_ADDRESS=smtp_graph_bridge
      - SMTP_PORT=${DOCUSEAL_SMTP_PORT:-1025}
      - SMTP_DOMAIN=${DOCUSEAL_HOST:-docuseal.local}
      - SMTP_ENABLE_STARTTLS=false
      - SMTP_ENABLE_STARTTLS_AUTO=false
      - SMTP_FROM=${DOCUSEAL_SMTP_FROM:-admin@example.org}
    volumes:
      - ./grievance-mvp/data/docuseal:/data
    networks:
      - grievance-net
      - smtp-relay-net

  docuseal_proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - docuseal
    volumes:
      - ./grievance-mvp/nginx/docuseal.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - grievance-net
    ports:
      - "127.0.0.1:${DOCUSEAL_PORT:-8081}:8080"

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    network_mode: host
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:?CLOUDFLARE_TUNNEL_TOKEN is required}
    depends_on:
      - docuseal_proxy
      - api

volumes:
  docuseal_db_data:
